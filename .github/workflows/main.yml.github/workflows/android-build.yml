name: Android APK 자동 빌드

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 받기
        uses: actions/checkout@v4

      - name: Java 설치
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK 설치
        uses: android-actions/setup-android@v3

      - name: Gradle 설치
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Android 프로젝트 구조 만들기
        shell: bash
        run: |
          mkdir -p app/src/main/java/com/taegyeong/lottolab
          mkdir -p app/src/main/res/values

          cp MainActivity.kt app/src/main/java/com/taegyeong/lottolab/MainActivity.kt
          cp AndroidManifest.xml app/src/main/AndroidManifest.xml
          cp themes.xml app/src/main/res/values/themes.xml

          cat > settings.gradle.kts <<'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.name = "TaegyeongLottoLab"
          include(":app")
          EOF

          cat > build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application") version "8.5.2" apply false
              id("org.jetbrains.kotlin.android") version "1.9.24" apply false
          }
          EOF

          cat > app/build.gradle.kts <<'EOF'
          plugins {
              id("com.android.application")
              id("org.jetbrains.kotlin.android")
          }

          android {
              namespace = "com.taegyeong.lottolab"
              compileSdk = 35

              defaultConfig {
                  applicationId = "com.taegyeong.lottolab"
                  minSdk = 23
                  targetSdk = 35
                  versionCode = 1
                  versionName = "1.0.0"
              }

              buildFeatures {
                  compose = true
              }

              composeOptions {
                  kotlinCompilerExtensionVersion = "1.5.14"
              }

              packaging {
                  resources {
                      excludes += "/META-INF/{AL2.0,LGPL2.1}"
                      excludes += "META-INF/DEPENDENCIES"
                      excludes += "META-INF/NOTICE*"
                      excludes += "META-INF/LICENSE*"
                  }
              }
          }

          dependencies {
              val composeBom = platform("androidx.compose:compose-bom:2024.09.03")

              implementation(composeBom)
              implementation("androidx.core:core-ktx:1.13.1")
              implementation("androidx.activity:activity-compose:1.9.2")
              implementation("androidx.lifecycle:lifecycle-runtime-ktx:2.8.6")
              implementation("androidx.compose.ui:ui")
              implementation("androidx.compose.ui:ui-tooling-preview")
              implementation("androidx.compose.foundation:foundation")
              implementation("androidx.compose.material3:material3")
              debugImplementation("androidx.compose.ui:ui-tooling")

              implementation("com.google.mlkit:text-recognition-korean:16.0.1")
              implementation("org.jetbrains.kotlinx:kotlinx-coroutines-play-services:1.8.1")
              implementation("org.apache.poi:poi-ooxml:5.3.0")
          }
          EOF

          cat > gradle.properties <<'EOF'
          org.gradle.jvmargs=-Xmx4g -Dfile.encoding=UTF-8
          android.useAndroidX=true
          kotlin.code.style=official
          EOF

      - name: Android SDK 구성
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: APK 빌드
        run: gradle :app:assembleDebug --stacktrace

      - name: APK 이름 변경
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
          TaegyeongLottoLab-Android-v1.0.apk

      - name: APK 다운로드 등록
        uses: actions/upload-artifact@v4
        with:
          name: TaegyeongLottoLab-Android-v1.0
          path: TaegyeongLottoLab-Android-v1.0.apk
          if-no-files-found: error
          retention-days: 30
