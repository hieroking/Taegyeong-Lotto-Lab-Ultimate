name: Android APK 자동 빌드

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "*.gradle.kts"
      - "settings.gradle.kts"
      - "gradle.properties"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Android SDK 설치
        run: |
          yes | sdkmanager --licenses >/dev/null
          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: APK 빌드
        run: gradle :app:assembleDebug --stacktrace

      - name: APK 이름 변경
        run: cp app/build/outputs/apk/debug/app-debug.apk TaegyeongLottoLab-Android-v1.0.apk

      - uses: actions/upload-artifact@v4
        with:
          name: TaegyeongLottoLab-Android-v1.0
          path: TaegyeongLottoLab-Android-v1.0.apk
          if-no-files-found: error
          retention-days: 30
